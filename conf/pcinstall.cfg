# pc-sysinstall config for an unattended GhostBSD install (anyvm-org builder).
#
# hooks/installOpts.sh fetches this file over the builder's local HTTP server
# (http://192.168.122.1:8000/conf/pcinstall.cfg) from a root shell on the live
# GhostBSD system and runs:  pc-sysinstall -c /tmp/pcinstall.cfg
#
# The directive set mirrors what GhostBSD's own GUI installer (gbi) writes -- see
# ghostbsd/gbi src/create_cfg.py -- for a "livezfs" full-disk clone of the live
# media onto a single ZFS pool. It is edition-independent: the installer clones
# whatever desktop (MATE / XFCE / Gershwin) is present on the booted live ISO.
#
# NOTE: the exact disk-layout / boot directives below very likely need one round
# of CI tuning against a real run (BIOS-vs-UEFI boot partition, swap layout, the
# display-manager service name). See README.md "Status".

installInteractive=no
installMode=fresh
installType=GhostBSD
installMedium=livezfs
packageType=livezfs

# Localization
localizeLang=en_US
localizeKeyLayout=us
timeZone=UTC
enableNTP=yes

# Network of the running installer (not the installed system); installed-system
# networking is configured via runCommand below.
hostname=ghostbsd

# Disk: full-disk GPT, FreeBSD/BIOS boot code, single OpenZFS root pool.
# The build VM exposes its disk as ada0 (VM_DISK=ide in the conf).
ashift=12
disk0=ada0
partition=all
partscheme=GPT
bootManager=bsd
efiLoader=none
commitDiskPart

# Partition layout for ada0. Sizes are in MB; 0 means "use the rest".
# SWAP is carved first so the ZFS root can take all remaining space.
disk0-part=SWAP 2048 none
disk0-part=ZFS 0 /
commitDiskLabel

# Root password (the builder reaches the installed VM with this via sshpass).
rootPass=anyvm.org

# GhostBSD expects a normal login user to exist.
userName=anyvm
userComment=anyvm
userPass=anyvm.org
userShell=/bin/sh
userHome=/home/anyvm
userGroups=wheel,operator
commitUser

# Post-install commands, run inside the freshly installed system.
# 1) Bring up sshd and DHCP so the builder can log in headlessly.
runCommand=sysrc sshd_enable=YES
runCommand=sysrc ifconfig_DEFAULT=DHCP
runCommand=sysrc zfs_enable=YES
# 2) Leave the display manager disabled so the image boots to a text console
#    (a getty "login:" prompt), which is what the builder waits for. The desktop
#    is fully installed -- enable one of these to boot straight to it.
runCommand=sysrc lightdm_enable=NO
runCommand=sysrc slim_enable=NO
runCommand=sysrc gdm_enable=NO
runCommand=sysrc sddm_enable=NO
runCommand=sysrc xdm_enable=NO
# 3) Permit the builder's root/password + env-forwarding SSH login.
runCommand=/bin/sh -c 'printf "\nPermitRootLogin yes\nPasswordAuthentication yes\nPermitEmptyPasswords yes\nAcceptEnv *\n" >> /etc/ssh/sshd_config'
